<details id="language-container" class="language-selector" data-language-select>
  <summary
    class="piggy-button piggy-button--m language-trigger site-nav-menu-button"
    aria-haspopup="true"
    aria-expanded="false"
    aria-controls="lang-dd"
    title="Language">
    <svg
      aria-hidden="true"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round">
      <circle cx="12" cy="12" r="10" />
      <path d="M2 12h20" />
      <path d="M12 2a15.3 15.3 0 0 1 0 20" />
      <path d="M12 2a15.3 15.3 0 0 0 0 20" />
    </svg>
    <span class="language-flag">{{ current_language.flag }}</span>
    <span class="language-current">{{ current_language.name }}</span>
    <svg
      class="language-chevron"
      aria-hidden="true"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round">
      <path d="m6 9 6 6 6-6" />
    </svg>
  </summary>

  <div
    class="language-dropdown"
    id="lang-dd"
    role="listbox"
    data-language-dropdown>
    {% for lang, val in supported_languages.items() %}
      <a
        data-lang="{{ lang }}"
        role="option"
        aria-selected="{{ 'true' if lang == current_language.key else 'false' }}"
        {% if github_pages %}
          href="{{ request.path.split('/lang/')[0] }}{{ '/lang/' + lang if lang else '' }}"
        {% else %}
          href="{{ request.path.split('/lang/')[0] }}"
          data-language-option="{{ lang }}"
        {% endif %}>
        <span class="language-flag">{{ val.flag }}</span>
        <span class="language-name">{{ val.name }}</span>
      </a>
    {% endfor %}
  </div>
</details>
